# DEMO ONLY - wide open (no auth, no TLS, CORS "*"). For appliance / plant
# deployments use /config/gateway_params.secure.yaml instead (auth + TLS +
# restricted CORS + rate limiting). See ros2_medkit_gateway design/hardening.rst.
ros2_medkit_gateway:
  ros__parameters:
    server:
      host: "0.0.0.0"
      port: 8080
    refresh_interval_ms: 2000
    cors:
      # DEMO ONLY - restrict origins in production deployments
      allowed_origins: ["*"]
    plugins: ["opcua"]
    plugins.opcua.poll_interval_ms: 1000
