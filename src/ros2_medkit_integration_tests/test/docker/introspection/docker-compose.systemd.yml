# Docker Compose for systemd introspection plugin integration tests.
# Runs gateway + demo nodes inside a systemd-managed container.
# Requires: privileged mode, cgroup host namespace for full systemd support.

services:
  gateway-systemd:
    build:
      context: ../../../..  # worktree root (ros2_medkit)
      dockerfile: src/ros2_medkit_integration_tests/test/docker/introspection/Dockerfile.systemd
    privileged: true  # Required for systemd as PID 1
    ports:
      - "9200:8080"
    tmpfs:
      - /run
      - /run/lock
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns: host
    stop_signal: SIGRTMIN+3  # Proper systemd shutdown signal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
